smart_reg_manager_like:
  module: smart_reg_app
  class: SmartRegManagerLike
  enable_entity: input_boolean.zendure_bridge_py_aktiviert
  p1_entity: sensor.shellypro3em_total_active_power
  active_pack_select_entity: input_select.zendure_active_pack  # optional
  ac_mode_values:
    input: ["input","Input mode"]
    output: ["output","Output mode"]
  target_w: input_number.p1_sensor_target        # Regelziel in W; >0 = gewollter Netzbezug, <0 = gewollte Einspeisung
  deadband_w: input_number.p1_sensor_deathband

  packs:
    - id: l1_mqtt
      soc_entity: sensor.eeb4aep1p031393_electriclevel
      minsoc_entity: number.eeb4aep1p031393_minsoc
      maxsoc_entity: number.eeb4aep1p031393_socset
      battery_output_entity: sensor.eeb4aep1p031393_packinputpower
      battery_input_entity: sensor.eeb4aep1p031393_outputpackpower
      out_limit_entity: number.eeb4aep1p031393_outputlimit
      in_limit_entity: number.eeb4aep1p031393_inputlimit
      ac_mode_entity: select.eeb4aep1p031393_acmode
      max_out_w: 2400
      max_in_w:  2400
    
    - id: l1_z-ha
      soc_entity: sensor.l1_solarflow_2400_pro_electric_level
      minsoc_entity: number.l1_solarflow_2400_pro_min_soc
      maxsoc_entity: number.l1_solarflow_2400_pro_soc_set
      battery_output_entity: sensor.l1_solarflow_2400_pro_pack_input_power     # Entladen
      battery_input_entity:  sensor.l1_solarflow_2400_pro_output_pack_power     # Laden
      out_limit_entity: number.l1_solarflow_2400_pro_output_limit
      in_limit_entity:  number.l1_solarflow_2400_pro_input_limit
      ac_mode_entity:   select.l1_solarflow_2400_pro_ac_mode
      fuse_group_entity: select.l1_solarflow_2400_pro_fuse_group
      max_out_w: 2400
      max_in_w:  2400
    
    - id: l2_mqtt
      soc_entity: sensor.hoa1npn3n203982_electriclevel
      minsoc_entity: number.hoa1npn3n203982_minsoc
      maxsoc_entity: number.hoa1npn3n203982_socset
      battery_output_entity: sensor.hoa1npn3n203982_packinputpower
      battery_input_entity: sensor.hoa1npn3n203982_outputpackpower
      out_limit_entity: number.hoa1npn3n203982_outputlimit
      in_limit_entity: number.hoa1npn3n203982_inputlimit
      ac_mode_entity:   select.hoa1npn3n203982_acmode
      max_out_w: 2400
      max_in_w:  2400

    - id: l2_z-ha
      soc_entity: sensor.l2_solarflow_2400_ac_electric_level
      minsoc_entity: number.l2_solarflow_2400_ac_min_soc
      maxsoc_entity: number.l2_solarflow_2400_ac_soc_set
      battery_output_entity: sensor.l2_solarflow_2400_ac_pack_input_power     # Entladen
      battery_input_entity:  sensor.l2_solarflow_2400_ac_output_pack_power     # Laden
      out_limit_entity: number.l2_solarflow_2400_ac_output_limit
      in_limit_entity:  number.l2_solarflow_2400_ac_input_limit
      ac_mode_entity:   select.l2_solarflow_2400_ac_ac_mode
      fuse_group_entity: select.l2_solarflow_2400_ac_fuse_group
      max_out_w: 2400
      max_in_w:  2400

    - id: l3_mqtt
      soc_entity: sensor.hoa1npn4n230807_electriclevel
      minsoc_entity: number.hoa1npn4n230807_minsoc
      maxsoc_entity: number.hoa1npn4n230807_socset
      battery_output_entity: sensor.hoa1npn4n230807_packinputpower
      battery_input_entity: sensor.hoa1npn4n230807_outputpackpower
      out_limit_entity: number.hoa1npn4n230807_outputlimit
      in_limit_entity: number.hoa1npn4n230807_inputlimit
      ac_mode_entity:   select.hoa1npn4n230807_acmode
      max_out_w: 2400
      max_in_w:  2400

    - id: l3_z-ha
      soc_entity: sensor.l3_solarflow_2400_ac_electric_level
      minsoc_entity: number.l3_solarflow_2400_ac_min_soc
      maxsoc_entity: number.l3_solarflow_2400_ac_soc_set
      battery_output_entity: sensor.l3_solarflow_2400_ac_pack_input_power     # Entladen
      battery_input_entity:  sensor.l3_solarflow_2400_ac_output_pack_power     # Laden
      out_limit_entity: number.l3_solarflow_2400_ac_output_limit
      in_limit_entity:  number.l3_solarflow_2400_ac_input_limit
      ac_mode_entity:   select.l3_solarflow_2400_ac_ac_mode
      fuse_group_entity: select.l3_solarflow_2400_ac_fuse_group
      max_out_w: 2400
      max_in_w:  2400
